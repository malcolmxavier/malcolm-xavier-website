# ─────────────────────────────────────────────────────────────────
# Hourly /television refresh — probe-then-bootstrap.
#
# Mirrors the role of films-rss-refresh.yml but adapted to
# Serializd (no RSS feed). The script first probes the diary's
# first page; if no new reviews are detected, it exits without
# touching the snapshot. When new activity is detected it spawns
# the full bootstrap, which re-paginates the diary, re-applies
# sticky-TMDB carryover, and rewrites the snapshot.
#
# Schedule: hourly at :30, intentionally offset 30 minutes from
# the films workflow's :00 cron. Both workflows commit + push to
# main, and a concurrent push race would fail the second one;
# staggering keeps each cron tick clean. The semantic cadence
# (hourly) matches /films per Malcolm's request.
#
# Required secrets:
#   • TMDB_API_KEY — same v3 API key /films uses. Already in repo
#     secrets; no new secret to add.
#
# Required permissions:
#   • contents: write — so the GITHUB_TOKEN can commit + push the
#     snapshot diff. Reads-only by default.
#
# Run on demand: GitHub UI → Actions → "Television · Refresh"
# → Run workflow.
# ─────────────────────────────────────────────────────────────────

name: Television · Refresh

on:
  schedule:
    # Hourly at :30, offset from films' :00 cron to avoid push
    # races on main.
    - cron: "30 * * * *"
  workflow_dispatch:

# Single-flight per workflow — if a previous tick is still running
# (e.g. the bootstrap is mid-paginate), queue rather than cancel
# so we don't lose mid-flight commits.
concurrency:
  group: television-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Probe + (conditionally) bootstrap
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: node scripts/refresh-serializd-incremental.mjs

      - name: Commit + push if snapshot changed
        run: |
          # Stage ONLY the snapshot fixture. Bootstrap also
          # rewrites data/television/cleanup/*.md (timestamps
          # update on every run), but those are editorial-only
          # surfaces — committing them from CI would create
          # hourly noise commits even when no category content
          # changed. Cleanup reports stay refreshed via Malcolm's
          # manual `npm run television:bootstrap` runs during
          # editorial passes.
          if git diff --quiet lib/feeds/_fixtures/serializd-snapshot.json; then
            echo "No snapshot changes to commit — probe found nothing new, or bootstrap was a no-op."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/feeds/_fixtures/serializd-snapshot.json
          DELTA=$(git diff --cached --shortstat lib/feeds/_fixtures/serializd-snapshot.json)
          git commit -m "Auto-refresh /television snapshot from Serializd

          Picked up new reviews from https://serializd.com/user/malxavi
          via the hourly television-refresh workflow.

          $DELTA"
          # Same-window race guard — if the films-rss-refresh job
          # also pushed in this window, the bare push will be
          # rejected as non-fast-forward and the snapshot would
          # silently fail to land. Pull --rebase the missed commit
          # and retry once. Cron offset (:30 vs :00) makes this
          # rare but not impossible.
          git push || (git pull --rebase && git push)
