# ─────────────────────────────────────────────────────────────────
# Hourly RSS-driven /films refresh.
#
# Pulls the last ~50 entries from Malcolm's Letterboxd RSS, diffs
# against the committed snapshot at lib/feeds/_fixtures/letterboxd-
# snapshot.json, enriches any new films via TMDB, and commits +
# pushes the updated snapshot when something changed. Vercel
# auto-deploys on push, so new reviews land on the live site
# within roughly one cron tick.
#
# No-op runs are the common case (RSS hasn't moved since the last
# refresh). Those finish in ~5 seconds and skip the commit step
# entirely.
#
# Required secrets:
#   • TMDB_API_KEY — set in GitHub repo secrets. Same v3 API key
#     that powers the local refresh script.
#
# Required permissions:
#   • contents: write — so the GITHUB_TOKEN can commit + push.
#     Vercel's auto-deploy hook fires on the push exactly like a
#     human commit.
#
# To run on demand: GitHub UI → Actions → "Films · RSS refresh"
# → Run workflow.
# ─────────────────────────────────────────────────────────────────

name: Films · RSS refresh

on:
  schedule:
    # Every hour on the hour. GitHub Actions cron uses UTC; this
    # gives ~24 ticks/day independent of Malcolm's timezone.
    - cron: "0 * * * *"
  # Manual trigger from the Actions UI for debugging or one-off
  # refreshes.
  workflow_dispatch:

# Don't let two scheduled runs stack — if a previous tick is still
# running (shouldn't happen for a 5-second job, but possible on
# TMDB rate-limit retries), queue rather than cancel so we don't
# lose any committed state mid-flight.
concurrency:
  group: films-rss-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      # Required so the workflow's GITHUB_TOKEN can push the
      # updated snapshot back to main. Reads-only by default in
      # GitHub Actions; `contents: write` is the minimum scope.
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run incremental RSS refresh
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: node scripts/incremental-rss-refresh.mjs

      - name: Commit + push if snapshot changed
        run: |
          if git diff --quiet lib/feeds/_fixtures/letterboxd-snapshot.json; then
            echo "No changes to commit — RSS hasn't moved since last refresh."
            exit 0
          fi
          # Use github-actions[bot] as the author so the commit is
          # clearly attributable to CI in `git log`. Email format
          # follows GitHub's documented bot-account convention.
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/feeds/_fixtures/letterboxd-snapshot.json
          # Commit message includes a quick stat so `git log --oneline`
          # remains skim-readable even when CI is the most-frequent
          # author.
          DELTA=$(git diff --cached --shortstat lib/feeds/_fixtures/letterboxd-snapshot.json)
          git commit -m "Auto-refresh /films snapshot from RSS

          Picked up new reviews from https://letterboxd.com/malxavi/rss/
          via the hourly films-rss-refresh workflow.

          $DELTA"
          git push
